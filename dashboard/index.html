<!DOCTYPE html>
<html>
<head>
    <title>Link Bot Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📊 Link Bot Dashboard</h1>

    <div class="stats">
        <div class="card">Approved: <span id="approved">0</span></div>
        <div class="card">Blocked: <span id="blocked">0</span></div>
        <div class="card">Unchecked: <span id="unchecked">0</span></div>
    </div>

    <h2>Recent Approved Links</h2>
    <ul id="approvedList"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
